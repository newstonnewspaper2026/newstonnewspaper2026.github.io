<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Newston</title>
    <style>
      :root {
        --green: #2c7a2a;
        --paper: #fffdf7;
        --ink: #123c2c;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: var(--ink);
        background: var(--paper);
        font-family: Georgia, "Times New Roman", serif;
        text-align: center;
      }

      .card {
        max-width: 560px;
        padding: 2rem;
      }

      p {
        line-height: 1.6;
      }

      a {
        color: var(--green);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Newston</h1>
      <p>The Newston website is built automatically with GitHub Actions.</p>
      <p>If you are seeing this page instead of the newspaper homepage, open the repository settings and set <strong>Pages → Source</strong> to <strong>GitHub Actions</strong>.</p>
    </main>
  </body>
</html>
